<div class="main bg-blue-500 text-center py-10">
  <div class="flex justify-center items-center">
    <div class="login bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
      <form action="" method="post" class="space-y-6">
        <fieldset>
          <legend class="text-lg font-bold mb-4 text-gray-700">Login</legend>
          <div class="form-group">
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
            <input type="text" id="username" name="username" placeholder="Enter username or email"
              class="block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          </div>
          <div class="form-group">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password"
              class="block w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          </div>
          <button type="submit"
            class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition duration-300">
            Login
          </button>
        </fieldset>
      </form>
    </div>
  </div>
</div>
